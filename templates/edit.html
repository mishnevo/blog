{% extends 'base.html' %}

{% block title %}Редактировать — MyBlog{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-4 p-md-5">
                <h2 style="font-family:'Playfair Display',serif;" class="mb-4">
                    <i class="bi bi-pencil-square me-2" style="color:var(--accent);"></i>Редактировать пост
                </h2>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Заголовок</label>
                        <input type="text" name="title" class="form-control form-control-lg"
                               value="{{ post['title'] }}" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Содержание</label>
                        <textarea name="content" class="form-control" rows="10"
                                  required>{{ post['content'] }}</textarea>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-accent btn-lg">
                            <i class="bi bi-save me-1"></i> Сохранить
                        </button>
                        <a href="{{ url_for('post', post_id=post['id']) }}"
                           class="btn btn-outline-secondary btn-lg">Отмена</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
